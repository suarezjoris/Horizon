<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Horizon</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="libs/xterm.css">
  <script src="libs/xterm.js"></script>
  <script src="libs/xterm-addon-fit.js"></script>
  <script src="modules/diagnostic.js"></script>
</head>
<body>

<div id="diagnostic-overlay">
  <div id="diagnostic-box">
    <div id="diagnostic-header">
      <div id="diagnostic-logo">H</div>
      <div id="diagnostic-title">Horizon System Check</div>
    </div>
    <div id="diagnostic-list">
      <!-- Diagnostics will be injected here -->
      <div class="diagnostic-item loading">
        <div class="status-dot"></div>
        <div class="diagnostic-info">
          <div class="diagnostic-name">Initializing...</div>
          <div class="diagnostic-msg">Checking system dependencies</div>
        </div>
      </div>
    </div>
    <div id="diagnostic-footer">
      <button id="start-app-btn" disabled>Entering Horizon...</button>
    </div>
  </div>
</div>

<div id="tab-bar">
  <div id="tab-inner">
    <div class="tab active" data-tab="llm">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>
      <span>LLM</span>
    </div>
    <div class="tab" data-tab="image">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
      <span>Image</span>
    </div>
    <div class="tab" data-tab="roleplay">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4.5c4.5-1 9.5-1 14 0 0 7.5-3.1 13.5-7 13.5S5 12 5 4.5z"/><circle cx="9.4" cy="9.5" r="1"/><circle cx="14.6" cy="9.5" r="1"/><path d="M9 13.2c1.2 1.4 4.8 1.4 6 0"/></svg>
      <span>Roleplay</span>
    </div>
    <div class="tab" data-tab="notes">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M9 13h6M9 17h4"/></svg>
      <span>Notes</span>
    </div>
    <div class="tab" data-tab="code">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 8l-4 4 4 4"/><path d="M15 8l4 4-4 4"/><path d="M13.5 6l-3 12"/></svg>
      <span>Code</span>
    </div>
  </div>
  <div id="settings-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </div>
</div>

<div id="panels">
  <!-- LLM Panel -->
  <div class="panel active" id="panel-llm">
    <div id="chat-history"></div>
    <div id="file-preview-area" style="display: none;"></div>
    <div id="chat-input-area">
      <button id="attach-btn" title="Attach a file">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button id="mic-btn" title="Record audio">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3M8 22h8"/></svg>
      </button>
      <textarea id="chat-input" rows="1" placeholder="Ask anything or drop a file here... (/clear /memory /search /reindex)"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Image Panel -->
  <div class="panel" id="panel-image">
    <div id="image-container">
      <div id="image-generator-box">
        <textarea id="image-prompt" placeholder="Describe the image you want to generate..."></textarea>
        <div id="generate-controls">
          <div id="gen-status">Ready</div>
          <button id="generate-btn">Generate Image</button>
        </div>
      </div>

      <div id="image-result-preview">
        <img id="image-result-img" src="" alt="Generated result">
      </div>

      <div id="gallery-header">Recent Generations</div>
      <div id="image-gallery">
        <!-- Gallery items will be injected here -->
      </div>
    </div>
  </div>

  <!-- Roleplay Panel -->
  <div class="panel" id="panel-roleplay">
    <div id="rp-container">
      <!-- Sidebar / Roster -->
      <div id="rp-sidebar">
        <button id="rp-import-btn">Import Card (.png)</button>
        <div id="rp-roster"></div>
      </div>
      
      <!-- Chat Area -->
      <div id="rp-chat-area">
        <div id="rp-header">Select a character</div>
        <div id="rp-chat-history"></div>
        <div id="rp-input-area">
          <textarea id="rp-input" rows="1" placeholder="Type your message..." disabled></textarea>
          <button id="rp-send-btn" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Notes (Obsidian) Panel -->
  <div class="panel" id="panel-notes">
    <div id="notes-container">
      <div id="notes-sidebar">
        <div id="notes-list-header">
          <span>My Notes</span>
          <button id="new-note-btn">+</button>
        </div>
        <div id="notes-list"></div>
      </div>
      <div id="notes-editor-area">
        <input type="text" id="note-title" placeholder="Note Title...">
        <textarea id="note-content" placeholder="Write your thoughts here..."></textarea>
        <div id="note-controls">
          <button id="save-note-btn">Save Note</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Coding AI Panel -->
  <div class="panel" id="panel-code">
    <div id="oc-terminal-controls">
      <span id="oc-current-path">Project: ~/Projects/Horizon</span>
      <button id="oc-change-dir-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Change Project</span>
      </button>
    </div>
    <div id="oc-xterm-container"></div>
  </div>
</div>

<div id="settings-overlay">
  <div id="settings-panel">
    <h3>Settings</h3>
    <div class="setting-row"><label>Vault path</label><input id="s-vault" type="text"></div>
    <div class="setting-row"><label>LLM model</label><input id="s-llm" type="text"></div>
    <div class="setting-row"><label>Roleplay model</label><input id="s-rp" type="text"></div>
    <div class="setting-row"><label>ComfyUI path</label><input id="s-comfy" type="text"></div>
    <div class="setting-row">
      <label>Image Rating</label>
      <select id="s-rating">
        <option value="rating_safe">Safe</option>
        <option value="rating_explicit">Explicit (NSFW)</option>
      </select>
    </div>
    <button id="settings-save">Save</button>
  </div>
</div>

<script src="libs/purify.min.js"></script>
<script src="libs/marked.min.js"></script>
<script src="modules/diagnostic.js"></script>
<script src="modules/llm.js"></script>
<script src="modules/image.js"></script>
<script src="modules/roleplay.js"></script>
<script src="modules/openclaude.js"></script>
<script src="modules/notes.js"></script>
<script src="main.js"></script>
</body>
</html>
