<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Horizon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="tab-bar">
  <div class="tab active" data-tab="llm">💬 LLM</div>
  <div class="tab disabled" data-tab="image">🖼 Image</div>
  <div class="tab disabled" data-tab="roleplay">🎭 Roleplay</div>
  <div class="tab disabled" data-tab="code">⌨️ Code <span style="font-size:10px;opacity:.5">soon</span></div>
  <div id="settings-btn">⚙️</div>
</div>

<div id="panels">
  <div class="panel active" id="panel-llm">
    <div id="chat-history"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="Ask anything... (/clear /memory /search /note /remember /reindex)"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <div class="panel" id="panel-image">
    <div class="placeholder-panel"><h2>🖼 Image Generation</h2><p>Coming in Plan 2</p></div>
  </div>

  <div class="panel" id="panel-roleplay">
    <div class="placeholder-panel"><h2>🎭 Roleplay</h2><p>Coming in Plan 3</p></div>
  </div>

  <div class="panel" id="panel-code">
    <div class="placeholder-panel"><h2>⌨️ Coding AI</h2><p>Coming soon — OpenClaude integration</p></div>
  </div>
</div>

<div id="settings-overlay">
  <div id="settings-panel">
    <h3>Settings</h3>
    <div class="setting-row"><label>Vault path</label><input id="s-vault" type="text"></div>
    <div class="setting-row"><label>LLM model</label><input id="s-llm" type="text"></div>
    <div class="setting-row"><label>Roleplay model</label><input id="s-rp" type="text"></div>
    <div class="setting-row"><label>ComfyUI path</label><input id="s-comfy" type="text"></div>
    <button id="settings-save">Save</button>
  </div>
</div>

<script src="modules/llm.js"></script>
<script src="main.js"></script>
</body>
</html>
